services:
  - type: web
    name: ctf-neural
    runtime: python
    buildCommand: |
      apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y \
        binutils file xxd gdb strace ltrace \
        binwalk foremost \
        libimage-exiftool-perl \
        steghide \
        tshark \
        netcat-openbsd \
        radare2 \
        7zip \
        default-jdk \
        libgmp-dev libmpfr-dev libmpc-dev \
        ruby ruby-dev build-essential \
        libmagic1 \
        && gem install zsteg --no-document 2>/dev/null || true \
        && pip install -r requirements.txt \
        && pip install gmpy2 2>/dev/null || true \
        && pip install pwntools 2>/dev/null || true \
        && pip install unicorn 2>/dev/null || true \
        && pip install web3 2>/dev/null || true \
        && pip install angr 2>/dev/null || true
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 180 --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
