# Configuration nixpacks pour Railway
[phases.setup]
nixPkgs = [
  "python311",
  "gdb", "strace", "ltrace",
  "binutils", "file", "xxd",
  "radare2",
  "p7zip",
  "netcat",
  "jdk",
  "ruby",
  "exiftool",
  "tshark",
]

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "pip install pwntools pycryptodome z3-solver gmpy2 capstone unicorn pefile || true",
  "gem install zsteg --no-document || true",
]

[start]
cmd = "gunicorn app:app --workers 2 --threads 4 --timeout 180 --bind 0.0.0.0:$PORT"
